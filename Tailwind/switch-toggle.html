<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch-Toggle</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- <span class="text-lg mb-4 font-bold text-center">스위치/토글</span> -->
    <span class="text-base font-bold">알림</span>
    
<label class="inline-flex items-center cursor-pointer">
  <input type="checkbox" value="" class="sr-only peer" checked>
  <div class="relative w-11 h-6 bg-gray-200 rounded-full peer dark:peer-focus:ring-blue-800 dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600 dark:peer-checked:bg-blue-600"></div>
</label>

<label id="dropArea" class="block border-2 border-dashed border-blue-400 rounded-lg p-8 text-center transition bg-white w-48 h-48">
    <span class="block text-gray-800 font-medium leading-tight">
    파일을 드래그<br>하거나 클릭하세요
  </span>
</label>


</body>
</html>
